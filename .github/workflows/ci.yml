name: CI

# Build verification on every push and PR. Catches "I broke main" before
# the deploy workflow tries to ship it to prod.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-java:
    name: Build Spring Boot
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: mvn package
        working-directory: SubbyBankbackend
        run: mvn -B -DskipTests package

  build-findoc:
    name: Build findoc-verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install + import-check
        working-directory: findoc-verify
        run: |
          pip install --upgrade pip
          pip install -e .
          python -c "import src"

  build-loan:
    name: Build SubbyPythonLoan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install + import-check
        working-directory: SubbyPythonLoan
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          python -c "import src"

  docker-build-check:
    name: Verify Dockerfiles
    runs-on: ubuntu-latest
    needs: [build-java, build-findoc, build-loan]
    steps:
      - uses: actions/checkout@v4
      - name: Build all images (no push)
        run: |
          docker build -t check/bank   ./SubbyBankbackend
          docker build -t check/findoc ./findoc-verify
          docker build -t check/loan   ./SubbyPythonLoan
